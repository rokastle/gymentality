spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3307/gymentality?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Demo mode: schema.sql recreates the schema and data.sql reseeds fixed demo data
# on each backend startup. This intentionally discards new accounts, bookings,
# and notifications so the project defense always starts from a clean state.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Keep this as "always" while the app is used as a demo.
spring.sql.init.mode=always

server.port=8080

app.cors.allowed-origins=http://localhost:5173

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
